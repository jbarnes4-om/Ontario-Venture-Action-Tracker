<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ontario Venture – Top 5 Corrective Action Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #0a0e14; font-family: 'DM Mono', monospace; color: #c9d1d9; padding: 32px 24px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0f1318; }
  ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }

/* Buttons */
.btn { cursor: pointer; border: none; border-radius: 6px; font-family: ‘DM Mono’, monospace; font-size: 13px; transition: all 0.18s; }
.btn:hover { opacity: 0.85; transform: translateY(-1px); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-primary { background: #1d6dbd; color: #fff; padding: 9px 18px; }
.btn-ghost   { background: transparent; color: #8b949e; border: 1px solid #2d3748; padding: 7px 14px; }
.btn-ghost:hover { border-color: #4a5568; color: #c9d1d9; }
.btn-danger  { background: #7f1d1d; color: #fca5a5; padding: 6px 12px; font-size: 12px; }
.btn-edit    { background: #1e3a5f; color: #93c5fd; padding: 6px 12px; font-size: 12px; }

/* Filter pills */
.filter-pill { cursor: pointer; padding: 6px 14px; border-radius: 20px; font-size: 12px; border: 1px solid #2d3748; background: transparent; color: #8b949e; font-family: ‘DM Mono’, monospace; transition: all 0.15s; }
.filter-pill.active { border-color: #1d6dbd; background: #0d1f35; color: #60a5fa; }
.filter-pill:hover:not(.active) { border-color: #4a5568; color: #c9d1d9; }

/* Form elements */
input, select, textarea { background: #0f1318; border: 1px solid #2d3748; border-radius: 6px; color: #c9d1d9; font-family: ‘DM Mono’, monospace; font-size: 13px; padding: 9px 12px; width: 100%; outline: none; transition: border-color 0.15s; }
input:focus, select:focus, textarea:focus { border-color: #1d6dbd; }
select option { background: #0f1318; }
label { font-size: 11px; color: #6b7280; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; display: block; }
input[type=“date”]::-webkit-calendar-picker-indicator { filter: invert(0.4); }

/* Table rows */
.row-completed { background: rgba(22,163,74,0.05);  border-left: 3px solid #16a34a; }
.row-overdue   { background: rgba(220,38,38,0.06);  border-left: 3px solid #dc2626; }
.row-ongoing   { background: rgba(202,138,4,0.05);  border-left: 3px solid #ca8a04; }
.row-completed:hover { background: rgba(22,163,74,0.10); }
.row-overdue:hover   { background: rgba(220,38,38,0.10); }
.row-ongoing:hover   { background: rgba(202,138,4,0.08); }
tr td { transition: background 0.12s; }

/* Table header sort */
.sort-th { cursor: pointer; user-select: none; white-space: nowrap; }
.sort-th:hover { color: #60a5fa; }

/* Badge */
.badge { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 500; }

/* Stat cards */
.stat-card { background: #0f1318; border: 1px solid #1e2733; border-radius: 10px; padding: 18px 22px; flex: 1; min-width: 120px; }

/* Search */
.search-wrap { position: relative; }
.search-wrap input { padding-left: 34px; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #4a5568; font-size: 14px; pointer-events: none; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: #0f1318; border: 1px solid #2d3748; border-radius: 12px; padding: 32px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }

/* Grid helpers */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.flex { display: flex; }
.gap-6 { gap: 6px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.flex-wrap { flex-wrap: wrap; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.ml-auto { margin-left: auto; }

/* Save indicator */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
.save-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.save-dot.saving { animation: pulse 1s ease-in-out infinite; }
.save-pill { display: flex; align-items: center; gap: 7px; background: #0f1318; border: 1px solid #1e2733; border-radius: 20px; padding: 5px 14px; }
.save-label { font-size: 11px; letter-spacing: 0.04em; }
</style>

</head>
<body>

<!-- Header -->

<div class="flex items-center justify-between flex-wrap gap-16" style="margin-bottom:28px">
  <div>
    <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#e2e8f0;letter-spacing:-0.02em;margin-bottom:2px">Ontario Venture</div>
    <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:#4a5568;letter-spacing:0.2em;text-transform:uppercase">Top 5 Corrective Action Tracker</div>
  </div>
  <div class="flex items-center gap-12">
    <div class="save-pill" id="savePill">
      <span class="save-dot" id="saveDot" style="background:#4a5568"></span>
      <span class="save-label" id="saveLabel" style="color:#4a5568">No data yet</span>
    </div>
    <button class="btn btn-primary" onclick="openAdd()">+ New Action</button>
  </div>
</div>

<!-- Stats -->

<div class="flex flex-wrap gap-12" style="margin-bottom:28px" id="statsRow">
  <div class="stat-card" style="border-color:#60a5fa33"><div style="font-size:28px;font-weight:700;font-family:'Syne',sans-serif;color:#60a5fa" id="statTotal">0</div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px">Total Actions</div></div>
  <div class="stat-card" style="border-color:#f8717133"><div style="font-size:28px;font-weight:700;font-family:'Syne',sans-serif;color:#f87171" id="statOverdue">0</div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px">Overdue</div></div>
  <div class="stat-card" style="border-color:#fbbf2433"><div style="font-size:28px;font-weight:700;font-family:'Syne',sans-serif;color:#fbbf24" id="statOngoing">0</div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px">Ongoing</div></div>
  <div class="stat-card" style="border-color:#4ade8033"><div style="font-size:28px;font-weight:700;font-family:'Syne',sans-serif;color:#4ade80" id="statCompleted">0</div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px">Completed</div></div>
</div>

<!-- Filters -->

<div style="background:#0f1318;border:1px solid #1e2733;border-radius:10px;padding:18px 20px;margin-bottom:20px">
  <div class="flex flex-wrap gap-24 items-start" style="gap:24px">
    <div>
      <div style="font-size:11px;color:#4a5568;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Category</div>
      <div class="flex gap-6 flex-wrap" id="catPills"></div>
    </div>
    <div>
      <div style="font-size:11px;color:#4a5568;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Priority</div>
      <div class="flex gap-6 flex-wrap" id="priPills"></div>
    </div>
    <div>
      <div style="font-size:11px;color:#4a5568;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Status</div>
      <div class="flex gap-6 flex-wrap" id="staPills"></div>
    </div>
    <div style="margin-left:auto;min-width:200px">
      <div style="font-size:11px;color:#4a5568;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">Search</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="searchInput" placeholder="Title, assignee..." oninput="render()" style="font-size:13px" />
      </div>
    </div>
  </div>
</div>

<!-- Legend -->

<div class="flex flex-wrap items-center" style="gap:18px;margin-bottom:14px;font-size:11px;color:#6b7280">
  <span style="letter-spacing:0.07em;text-transform:uppercase">Legend:</span>
  <span class="flex items-center" style="gap:6px"><span style="width:10px;height:10px;border-radius:2px;background:#16a34a;display:inline-block"></span>Completed</span>
  <span class="flex items-center" style="gap:6px"><span style="width:10px;height:10px;border-radius:2px;background:#dc2626;display:inline-block"></span>Overdue</span>
  <span class="flex items-center" style="gap:6px"><span style="width:10px;height:10px;border-radius:2px;background:#ca8a04;display:inline-block"></span>Ongoing</span>
</div>

<!-- Table -->

<div style="background:#0f1318;border:1px solid #1e2733;border-radius:10px;overflow:hidden">
  <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:13px" id="mainTable">
      <thead>
        <tr style="border-bottom:1px solid #1e2733;background:#080c10">
          <th class="sort-th" onclick="sortBy('_idx')"  style="padding:12px 14px;text-align:left;color:#6b7280;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;width:40px;white-space:nowrap">#</th>
          <th class="sort-th" onclick="sortBy('title')" style="padding:12px 14px;text-align:left;color:#6b7280;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;width:200px;white-space:nowrap">Action Title <span id="sh_title"></span></th>
          <th class="sort-th" onclick="sortBy('category')" style="padding:12px 14px;text-align:left;color:#6b7280;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap">Category <span id="sh_category"></span></th>
          <th class="sort-th" onclick="sortBy('priority')" style="padding:12px 14px;text-align:left;color:#6b7280;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap">Priority <span id="sh_priority"></span></th>
          <th class="sort-th" onclick="sortBy('assignee')" style="padding:12px 14px;text-align:left;color:#6b7280;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap">Assignee <span id="sh_assignee"></span></th>
          <th class="sort-th" onclick="sortBy('reportedDate')" style="padding:12px 14px;text-align:left;color:#6b7280;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap">Reported <span id="sh_reportedDate"></span></th>
          <th class="sort-th" onclick="sortBy('dueDate')" style="padding:12px 14px;text-align:left;color:#6b7280;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap">Due Date <span id="sh_dueDate"></span></th>
          <th style="padding:12px 14px;text-align:left;color:#6b7280;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap">Timeline</th>
          <th style="padding:12px 14px;text-align:left;color:#6b7280;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap">Status</th>
          <th style="padding:12px 14px;width:100px"></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>
<div style="margin-top:10px;font-size:11px;color:#2d3748;text-align:right" id="footerCount"></div>

<!-- Modal -->

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#e2e8f0;margin-bottom:24px" id="modalTitle">New Corrective Action</div>
    <div style="display:grid;gap:16px">
      <div>
        <label>Action Title *</label>
        <input id="fTitle" placeholder="Describe the corrective action..." />
      </div>
      <div class="grid-2">
        <div>
          <label>Category *</label>
          <select id="fCategory">
            <option>IT</option><option>Technical</option><option>Operations</option><option>HSQE</option><option>Crewing</option>
          </select>
        </div>
        <div>
          <label>Priority *</label>
          <select id="fPriority">
            <option>High</option><option>Medium</option><option>Low</option>
          </select>
        </div>
      </div>
      <div class="grid-2">
        <div>
          <label>Status</label>
          <select id="fStatus">
            <option>Open</option><option>Ongoing</option><option>Completed</option>
          </select>
        </div>
        <div>
          <label>Assignee</label>
          <input id="fAssignee" placeholder="Name" />
        </div>
      </div>
      <div class="grid-2">
        <div>
          <label>Reported Date *</label>
          <input type="date" id="fReported" />
        </div>
        <div>
          <label>Due Date *</label>
          <input type="date" id="fDue" />
        </div>
      </div>
      <div>
        <label>Description</label>
        <textarea id="fDesc" rows="3" placeholder="Additional details..." style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="flex gap-12 justify-between" style="margin-top:24px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveForm()">Add Action</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'ov_top5_html_v1';
const CAT_ICONS   = { IT:'💻', Technical:'⚙️', Operations:'🔧', HSQE:'🛡️', Crewing:'⚓' };
const PRI_COLORS  = { High:{color:'#f87171',bg:'#2a0a0a'}, Medium:{color:'#fbbf24',bg:'#1a1500'}, Low:{color:'#4ade80',bg:'#0d2818'} };
const STATUS_STYLES = {
  completed: { bg:'#0d2818', border:'#16a34a', text:'#4ade80', label:'Completed' },
  overdue:   { bg:'#2a0a0a', border:'#dc2626', text:'#f87171', label:'Overdue'   },
  ongoing:   { bg:'#1a1500', border:'#ca8a04', text:'#fbbf24', label:'Ongoing'   },
};

let actions  = [];
let editId   = null;
let filterCat = 'All';
let filterPri = 'All';
let filterSta = 'All';
let sortKey  = 'dueDate';
let sortAsc  = true;
let saveTimer = null;
let lastSaved = null;

// ── Persistence ───────────────────────────────────────────────────────────────
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      if (p.actions) actions = p.actions;
      if (p.lastSaved) { lastSaved = p.lastSaved; updateSaveUI('idle'); }
    }
  } catch {}
}

function saveData() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    updateSaveUI('saving');
    try {
      const payload = JSON.stringify({ actions, lastSaved: new Date().toISOString() });
      localStorage.setItem(STORAGE_KEY, payload);
      lastSaved = new Date().toISOString();
      updateSaveUI('saved');
      setTimeout(() => updateSaveUI('idle'), 2500);
    } catch {
      updateSaveUI('error');
      setTimeout(() => updateSaveUI('idle'), 3000);
    }
  }, 1200);
}

function updateSaveUI(state) {
  const dot   = document.getElementById('saveDot');
  const label = document.getElementById('saveLabel');
  const colors = { saving:'#fbbf24', saved:'#4ade80', error:'#f87171', idle:'#4a5568' };
  const c = colors[state];
  dot.style.background = c;
  label.style.color    = c;
  dot.classList.toggle('saving', state === 'saving');
  if      (state === 'saving') label.textContent = 'Saving…';
  else if (state === 'saved')  label.textContent = '✓ Saved';
  else if (state === 'error')  label.textContent = '✗ Save error';
  else if (lastSaved) label.textContent = 'Saved ' + new Date(lastSaved).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  else label.textContent = 'No data yet';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function todayISO() { return new Date().toISOString().split('T')[0]; }
function uid()      { return Date.now() + Math.random().toString(36).slice(2); }

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
}
function daysLeft(due) {
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.ceil((new Date(due + 'T00:00:00') - t) / 86400000);
}
function getRowStatus(item) {
  if (item.status === 'Completed') return 'completed';
  return new Date(item.dueDate + 'T00:00:00') < new Date() ? 'overdue' : 'ongoing';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Filter pills ──────────────────────────────────────────────────────────────
function buildPills() {
  const cats = ['All','IT','Technical','Operations','HSQE','Crewing'];
  const pris = ['All','High','Medium','Low'];
  const stas = ['All','Open','Ongoing','Completed','Overdue'];

  document.getElementById('catPills').innerHTML = cats.map(c =>
    `<button class="filter-pill${filterCat===c?' active':''}" onclick="setFilter('cat','${c}')">${c!=='All'?CAT_ICONS[c]+' ':''}${c}</button>`
  ).join('');
  document.getElementById('priPills').innerHTML = pris.map(p =>
    `<button class="filter-pill${filterPri===p?' active':''}" onclick="setFilter('pri','${p}')">${p}</button>`
  ).join('');
  document.getElementById('staPills').innerHTML = stas.map(s =>
    `<button class="filter-pill${filterSta===s?' active':''}" onclick="setFilter('sta','${s}')">${s}</button>`
  ).join('');
}

function setFilter(type, val) {
  if (type==='cat') filterCat = val;
  if (type==='pri') filterPri = val;
  if (type==='sta') filterSta = val;
  render();
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  render();
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  buildPills();

  // sort indicators
  ['title','category','priority','assignee','reportedDate','dueDate'].forEach(k => {
    const el = document.getElementById('sh_'+k);
    if (el) el.textContent = sortKey===k ? (sortAsc?' ↑':' ↓') : '';
  });

  const search = (document.getElementById('searchInput').value||'').toLowerCase();

  // filter
  let arr = actions.filter(a => {
    if (filterCat!=='All' && a.category!==filterCat) return false;
    if (filterPri!=='All' && a.priority!==filterPri) return false;
    if (filterSta!=='All') {
      if (filterSta==='Overdue' && getRowStatus(a)!=='overdue') return false;
      if (filterSta!=='Overdue' && a.status!==filterSta) return false;
    }
    if (search && ![a.title,a.assignee,a.category,a.description].some(f=>(f||'').toLowerCase().includes(search))) return false;
    return true;
  });

  // sort
  arr.sort((a,b) => {
    let va = a[sortKey]||'', vb = b[sortKey]||'';
    if (sortKey==='priority') { const o={High:0,Medium:1,Low:2}; va=o[va]; vb=o[vb]; }
    return va<vb?(sortAsc?-1:1):va>vb?(sortAsc?1:-1):0;
  });

  // stats
  document.getElementById('statTotal').textContent     = actions.length;
  document.getElementById('statOverdue').textContent   = actions.filter(a=>getRowStatus(a)==='overdue').length;
  document.getElementById('statOngoing').textContent   = actions.filter(a=>getRowStatus(a)==='ongoing').length;
  document.getElementById('statCompleted').textContent = actions.filter(a=>getRowStatus(a)==='completed').length;
  document.getElementById('footerCount').textContent   = `Showing ${arr.length} of ${actions.length} action${actions.length!==1?'s':''}`;

  // rows
  const tbody = document.getElementById('tableBody');
  if (arr.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10" style="padding:52px 20px;text-align:center">
      <div style="color:#4a5568;font-size:13px;margin-bottom:14px">No corrective actions yet.</div>
      <button class="btn btn-primary" onclick="openAdd()">+ Add your first action</button>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = arr.map((item, idx) => {
    const rs  = getRowStatus(item);
    const ss  = STATUS_STYLES[rs];
    const pc  = PRI_COLORS[item.priority];
    const days = daysLeft(item.dueDate);
    const daysLabel = rs==='completed' ? 'Done' : days<0 ? `${Math.abs(days)}d overdue` : days===0 ? 'Due today' : `${days}d left`;
    const daysColor = rs==='completed' ? '#4ade80' : days<0 ? '#f87171' : days<=3 ? '#fb923c' : days<=7 ? '#fbbf24' : '#4ade80';

    return `<tr class="row-${rs}" style="border-bottom:1px solid #13181f">
      <td style="padding:12px 14px;color:#4a5568;font-weight:500">${idx+1}</td>
      <td style="padding:12px 14px">
        <div style="color:#e2e8f0;font-weight:500;margin-bottom:2px">${esc(item.title)}</div>
        <div style="font-size:11px;color:#4a5568;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.description)}</div>
      </td>
      <td style="padding:12px 14px">
        <span style="background:#1a2030;border:1px solid #2d3748;border-radius:5px;padding:3px 9px;font-size:12px;color:#93c5fd">
          ${CAT_ICONS[item.category]} ${esc(item.category)}
        </span>
      </td>
      <td style="padding:12px 14px">
        <span class="badge" style="background:${pc.bg};color:${pc.color};border:1px solid ${pc.color}44">${esc(item.priority)}</span>
      </td>
      <td style="padding:12px 14px;color:#8b949e;white-space:nowrap">${esc(item.assignee)}</td>
      <td style="padding:12px 14px;color:#6b7280;white-space:nowrap;font-size:12px">${fmtDate(item.reportedDate)}</td>
      <td style="padding:12px 14px;color:#8b949e;white-space:nowrap;font-size:12px">${fmtDate(item.dueDate)}</td>
      <td style="padding:12px 14px;white-space:nowrap">
        <span style="color:${daysColor};font-size:12px;font-weight:500">${daysLabel}</span>
      </td>
      <td style="padding:12px 14px">
        <span class="badge" style="background:${ss.bg};color:${ss.text};border:1px solid ${ss.border}55;white-space:nowrap">${ss.label}</span>
      </td>
      <td style="padding:12px 14px">
        <div class="flex gap-6">
          <button class="btn btn-edit"   onclick="openEdit('${item.id}')">Edit</button>
          <button class="btn btn-danger" onclick="del('${item.id}')">✕</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ── CRUD ──────────────────────────────────────────────────────────────────────
function openAdd() {
  editId = null;
  document.getElementById('modalTitle').textContent = 'New Corrective Action';
  document.getElementById('modalSaveBtn').textContent = 'Add Action';
  document.getElementById('fTitle').value    = '';
  document.getElementById('fCategory').value = 'IT';
  document.getElementById('fPriority').value = 'High';
  document.getElementById('fStatus').value   = 'Open';
  document.getElementById('fAssignee').value = '';
  document.getElementById('fReported').value = todayISO();
  document.getElementById('fDue').value      = '';
  document.getElementById('fDesc').value     = '';
  document.getElementById('modalOverlay').classList.add('open');
}

function openEdit(id) {
  const item = actions.find(a => a.id === id);
  if (!item) return;
  editId = id;
  document.getElementById('modalTitle').textContent    = 'Edit Corrective Action';
  document.getElementById('modalSaveBtn').textContent  = 'Save Changes';
  document.getElementById('fTitle').value    = item.title;
  document.getElementById('fCategory').value = item.category;
  document.getElementById('fPriority').value = item.priority;
  document.getElementById('fStatus').value   = item.status;
  document.getElementById('fAssignee').value = item.assignee;
  document.getElementById('fReported').value = item.reportedDate;
  document.getElementById('fDue').value      = item.dueDate;
  document.getElementById('fDesc').value     = item.description;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function saveForm() {
  const title = document.getElementById('fTitle').value.trim();
  const due   = document.getElementById('fDue').value;
  if (!title || !due) return;
  const item = {
    id:           editId || uid(),
    title,
    category:     document.getElementById('fCategory').value,
    priority:     document.getElementById('fPriority').value,
    status:       document.getElementById('fStatus').value,
    assignee:     document.getElementById('fAssignee').value.trim(),
    reportedDate: document.getElementById('fReported').value,
    dueDate:      due,
    description:  document.getElementById('fDesc').value.trim(),
  };
  if (editId) {
    actions = actions.map(a => a.id === editId ? item : a);
  } else {
    actions.push(item);
  }
  closeModal();
  saveData();
  render();
}

function del(id) {
  actions = actions.filter(a => a.id !== id);
  saveData();
  render();
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
render();
</script>
